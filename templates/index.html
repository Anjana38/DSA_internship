<!DOCTYPE html>
<html>
<head>
    <title>Zomato Rating Predictor</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
        }

        label {
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: #ff4d4d;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e60000;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .suggestions {
            margin-top: 20px;
        }
    </style>

    <script>
        function updateCuisineCount() {
            let select = document.getElementById("cuisine");
            let count = select.selectedOptions.length;
            document.getElementById("cuisine_count").value = count;
        }
    </script>

</head>
<body>

<h2>Zomato Rating Predictor 🍽️</h2>

<form action="/predict" method="post">

    <label>Status:</label>
    <select name="status">
        <option value="1">Open</option>
        <option value="0">Closed</option>
    </select>

    <label>Online Delivery:</label>
    <select name="online">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Table Booking:</label>
    <select name="table">
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>

    <label>Area Popularity:</label>
    <input type="number" step="any" name="area_popularity" required>

    <label>Cost:</label>
    <input type="number" step="any" name="cost" required>

    <label>City:</label>
    <select name="city">
        <option>Mumbai</option>
        <option>Kochi</option>
        <option>Bangalore</option>
        <option>Pune</option>
        <option>Hyderabad</option>
        <option>Chennai</option>
        <option>Kolkata</option>
        <option>Trivandrum</option>
        <option>Mysore</option>
        <option>Surat</option>
        <option>Lucknow</option>
        <option>Other</option>
    </select>

    <label>Cost Category:</label>
    <select name="cost_category">
        <option value="0">Low</option>
        <option value="1">Medium</option>
        <option value="2">High</option>
    </select>

    <label>Restaurant Type:</label>
    <select name="restaurant_type">
        <option>Casual</option>
        <option>Premium</option>
        <option>Luxury</option>
    </select>

    <!-- MULTI CUISINE -->
    <label>Select Cuisines (Hold Ctrl to select multiple):</label>
    <select id="cuisine" name="cuisine" multiple size="8" onchange="updateCuisineCount()" required>
        <option>North Indian</option>
        <option>Chinese</option>
        <option>Fast Food</option>
        <option>South Indian</option>
        <option>Pizza</option>
        <option>Cafe</option>
        <option>Biryani</option>
        <option>Desserts</option>
        <option>Continental</option>
        <option>Italian</option>
        <option>Asian</option>
        <option>Beverages</option>
    </select>

    <label>Cuisine Count:</label>
    <input type="number" id="cuisine_count" readonly>

    <button type="submit">Predict Rating</button>

</form>

<!-- Prediction Output -->
<div class="result">
    <h3>{{ prediction_text }}</h3>
</div>

<!-- Suggestions -->
{% if suggestions %}
<div class="suggestions">
    <h3>💡 Suggestions to Improve Rating:</h3>
    <ul>
        {% for s in suggestions %}
            <li>{{ s }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

</body>
</html>
